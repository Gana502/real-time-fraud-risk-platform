name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - run: |
      python -m pytest -v

build-and-push:
needs: test
runs-on: ubuntu-latest

permissions:
  contents: read
  packages: write

steps:
  - uses: actions/checkout@v4

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build image
    run: |
      docker build -t ghcr.io/${{ github.repository_owner }}/fraud-risk-api:latest .

  - name: Push image
    run: |
      docker push ghcr.io/${{ github.repository_owner }}/fraud-risk-api:latest
